<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expedientes — Proyecto Fragmentado</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --c:#4ec9e8;--bg:#030810;--s:rgba(4,12,26,.97);
  --t:#cde8f0;--td:rgba(180,220,235,.4);--tm:rgba(180,220,235,.18);
  --bdr:rgba(78,201,232,.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--t);overflow-x:hidden;}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 40%,transparent 20%,rgba(3,8,16,.65) 100%);}
#scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);}

#app{position:relative;z-index:10;display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{width:280px;min-width:280px;height:100vh;overflow-y:auto;border-right:.5px solid var(--bdr);display:flex;flex-direction:column;background:rgba(3,8,16,.6);backdrop-filter:blur(8px);}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:rgba(78,201,232,.2);}
.sb-header{padding:20px 20px 16px;border-bottom:.5px solid var(--bdr);flex-shrink:0;}
.sb-back{font-size:10px;letter-spacing:.25em;color:var(--td);text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;transition:color .2s;}
.sb-back:hover{color:var(--c);}
.sb-back::before{content:'←';}
.sb-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;font-weight:300;color:#fff;}
.sb-sub{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--tm);margin-top:4px;}

/* FILTROS */
.sb-filters{display:flex;gap:4px;padding:10px 16px;border-bottom:.5px solid var(--bdr);flex-wrap:wrap;}
.sf{font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:4px 10px;border:.5px solid rgba(78,201,232,.15);color:var(--td);cursor:pointer;background:transparent;font-family:'Rajdhani',sans-serif;transition:all .18s;border-radius:1px;}
.sf:hover{color:var(--c);border-color:rgba(78,201,232,.4);}
.sf.on{color:var(--c);border-color:var(--c);background:rgba(78,201,232,.06);}

/* LISTA */
#char-list{flex:1;overflow-y:auto;padding:8px 0;}
#char-list::-webkit-scrollbar{width:3px;}
#char-list::-webkit-scrollbar-thumb{background:rgba(78,201,232,.15);}

.char-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:.5px solid rgba(78,201,232,.05);transition:background .2s;position:relative;}
.char-item:hover{background:rgba(78,201,232,.04);}
.char-item.active{background:rgba(78,201,232,.07);border-right:2px solid var(--c);}
.char-item.locked{opacity:.4;cursor:default;}

.char-avatar{width:38px;height:38px;border-radius:0;border:.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--c);background:rgba(78,201,232,.04);flex-shrink:0;position:relative;overflow:hidden;}
.char-avatar canvas{position:absolute;inset:0;width:100%;height:100%;}
.char-avatar-letter{position:relative;z-index:1;}

/* Avatar con imagen real */
.char-avatar-img{width:100%;height:100%;object-fit:cover;object-position:center top;position:absolute;inset:0;z-index:0;opacity:.8;filter:grayscale(30%) brightness(.85);}

.char-info{flex:1;min-width:0;}
.char-name{font-size:13px;font-weight:500;letter-spacing:.06em;color:#ddf0f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-role{font-size:10px;letter-spacing:.1em;color:var(--td);margin-top:1px;}
.char-status{font-size:8px;letter-spacing:.15em;text-transform:uppercase;padding:2px 7px;border-radius:1px;flex-shrink:0;}

/* Colores de estado */
.status-vivo{background:rgba(80,200,100,.1);border:.5px solid rgba(80,200,100,.3);color:rgba(120,220,130,.9);}
.status-desaparecido{background:rgba(255,180,0,.08);border:.5px solid rgba(255,180,0,.25);color:rgba(255,200,60,.8);}
.status-muerto{background:rgba(220,60,60,.08);border:.5px solid rgba(220,60,60,.25);color:rgba(220,80,80,.8);}
.status-desconocido{background:rgba(150,150,180,.08);border:.5px solid rgba(150,150,180,.2);color:rgba(160,160,200,.7);}
.status-fragmentado{background:rgba(78,201,232,.08);border:.5px solid rgba(78,201,232,.25);color:rgba(100,210,240,.85);}

.lock-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--tm);}

/* ── PANEL DETALLE ── */
#detail{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
#detail::-webkit-scrollbar{width:3px;}
#detail::-webkit-scrollbar-thumb{background:rgba(78,201,232,.15);}

/* ESTADO VACÍO */
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--tm);}
.empty-icon{font-size:32px;opacity:.3;}
.empty-t{font-size:11px;letter-spacing:.25em;text-transform:uppercase;}
.empty-s{font-size:10px;letter-spacing:.12em;color:rgba(78,201,232,.3);}

/* PERFIL */
#profile{display:none;flex-direction:column;}

/* Hero banner con imagen real */
.p-hero{height:220px;position:relative;overflow:hidden;border-bottom:.5px solid var(--bdr);}
.p-hero canvas{position:absolute;inset:0;width:100%;height:100%;}
.p-hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;opacity:0;transition:opacity .6s ease;}
.p-hero-img.loaded{opacity:.45;}
.p-hero-color-overlay{position:absolute;inset:0;mix-blend-mode:color;opacity:.35;}
.p-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 20%,rgba(3,8,16,.92) 100%);}
.p-hero-info{position:absolute;bottom:0;left:0;right:0;padding:20px 28px;}
.p-codename{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:rgba(78,201,232,.6);margin-bottom:6px;}
.p-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:32px;font-weight:300;color:#fff;line-height:1;}
.p-role{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--td);margin-top:6px;}

/* Status bar */
.p-statusbar{display:flex;align-items:center;gap:8px;padding:12px 28px;border-bottom:.5px solid var(--bdr);background:rgba(4,12,26,.5);}
.p-status-badge{font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:4px 12px;}
.p-id{font-size:10px;letter-spacing:.2em;color:var(--tm);margin-left:auto;}
.p-unlock-date{font-size:10px;letter-spacing:.12em;color:var(--tm);}

/* BODY */
.p-body{padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}

/* Sección */
.p-section{grid-column:1/-1;}
.p-section-half{grid-column:span 1;}
.sec-label{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(78,201,232,.5);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--bdr);}

/* Historia */
.p-lore{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:300;color:var(--td);line-height:1.95;}
.p-lore p{margin-bottom:10px;}
.p-lore p:last-child{margin:0;}

/* Stats */
.stats-grid{display:flex;flex-direction:column;gap:8px;}
.stat-row{display:flex;align-items:center;gap:10px;}
.stat-name{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--td);width:90px;flex-shrink:0;}
.stat-bar-wrap{flex:1;height:4px;background:rgba(78,201,232,.08);border-radius:0;overflow:hidden;}
.stat-bar{height:100%;border-radius:0;transition:width 1s cubic-bezier(.4,0,.2,1);}
.stat-val{font-size:11px;font-weight:600;color:var(--c);width:28px;text-align:right;flex-shrink:0;}

/* Info rápida */
.quick-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qi{padding:10px 12px;background:rgba(78,201,232,.03);border:.5px solid rgba(78,201,232,.08);}
.qi-l{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--tm);margin-bottom:4px;}
.qi-v{font-size:12px;color:var(--t);letter-spacing:.05em;}

/* Fragmentos */
.fragments-list{display:flex;flex-direction:column;gap:6px;}
.fragment{padding:10px 14px;background:rgba(78,201,232,.03);border-left:2px solid rgba(78,201,232,.2);position:relative;}
.fragment.locked-frag{opacity:.35;border-left-color:rgba(255,255,255,.1);}
.frag-num{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(78,201,232,.4);margin-bottom:4px;}
.frag-text{font-size:11px;color:var(--td);line-height:1.7;font-family:'Cormorant Garamond',serif;}
.frag-lock{font-size:10px;color:var(--tm);font-style:italic;}

/* Relaciones */
.rels{display:flex;flex-direction:column;gap:6px;}
.rel{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid rgba(78,201,232,.05);}
.rel:last-child{border:none;}
.rel-name{font-size:12px;color:var(--t);flex:1;}
.rel-type{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--td);padding:3px 8px;border:.5px solid rgba(78,201,232,.12);}

/* NO DESBLOQUEADO */
#locked-view{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;}
.lv-icon{font-size:28px;color:var(--tm);}
.lv-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:rgba(255,255,255,.3);}
.lv-desc{font-size:11px;letter-spacing:.15em;color:var(--tm);text-align:center;line-height:1.8;max-width:300px;}
.lv-input-wrap{width:100%;max-width:300px;}
.sys-input{width:100%;background:rgba(0,0,0,.4);border:.5px solid rgba(78,201,232,.2);padding:10px 14px;color:var(--c);font-family:'Rajdhani',monospace;font-size:13px;letter-spacing:.22em;text-transform:uppercase;outline:none;transition:border-color .2s;display:block;}
.sys-input:focus{border-color:rgba(78,201,232,.4);}
.sys-input::placeholder{color:rgba(78,201,232,.2);}
.lv-msg{font-size:10px;letter-spacing:.15em;color:var(--tm);text-align:center;height:14px;}
.btn{padding:10px 20px;background:transparent;border:.5px solid rgba(78,201,232,.25);color:rgba(78,201,232,.65);font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%;max-width:300px;}
.btn:hover{background:rgba(78,201,232,.08);color:var(--c);}

/* RESPONSIVE */
@media(max-width:700px){
  #sidebar{width:100%;min-width:0;height:auto;max-height:45vh;border-right:none;border-bottom:.5px solid var(--bdr);}
  #app{flex-direction:column;}
  #detail{height:auto;flex:1;}
  .p-body{grid-template-columns:1fr;}
  .p-section-half{grid-column:1/-1;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="vignette"></div>
<div id="scanlines"></div>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-header">
      <!-- ── Cambia "menu.html" si tu página principal tiene otro nombre ── -->
      <a class="sb-back" href="index.html">Volver al menú</a>
      <p class="sb-title">Expedientes</p>
      <p class="sb-sub" id="sb-count">cargando...</p>
    </div>
    <!-- ── Filtros — puedes agregar más status si creas nuevas categorías ── -->
    <div class="sb-filters">
      <button class="sf on" data-f="all">Todos</button>
      <button class="sf" data-f="vivo">Vivos</button>
      <button class="sf" data-f="desaparecido">Desap.</button>
      <button class="sf" data-f="muerto">Muertos</button>
      <button class="sf" data-f="desconocido">?</button>
    </div>
    <div id="char-list"></div>
  </aside>

  <!-- PANEL DETALLE -->
  <main id="detail">
    <div id="empty-state">
      <div class="empty-icon">◈</div>
      <p class="empty-t">Selecciona un expediente</p>
      <p class="empty-s">o desbloquea uno con un código</p>
    </div>

    <div id="profile">
      <div class="p-hero">
        <canvas id="hero-canvas"></canvas>
        <!-- Imagen real del personaje (se muestra encima del canvas si existe) -->
        <img id="hero-img" class="p-hero-img" src="" alt="" onload="this.classList.add('loaded')"/>
        <div id="hero-color-overlay" class="p-hero-color-overlay"></div>
        <div class="p-hero-overlay"></div>
        <div class="p-hero-info">
          <p class="p-codename" id="p-codename"></p>
          <h1 class="p-name" id="p-name"></h1>
          <p class="p-role" id="p-role"></p>
        </div>
      </div>
      <div class="p-statusbar">
        <span class="p-status-badge" id="p-status-badge"></span>
        <span class="p-unlock-date" id="p-unlock-date"></span>
        <span class="p-id" id="p-id"></span>
      </div>
      <div class="p-body" id="p-body"></div>
    </div>

    <div id="locked-view">
      <div class="lv-icon">🔒</div>
      <p class="lv-title" id="lv-name">Expediente clasificado</p>
      <p class="lv-desc">Este archivo está encriptado. Encuentra el código de acceso en las pistas del ARG para desbloquear la identidad de este sujeto.</p>
      <input class="sys-input" id="lv-input" maxlength="20" placeholder="INGRESAR CÓDIGO" spellcheck="false"/>
      <p class="lv-msg" id="lv-msg"></p>
      <button class="btn" onclick="checkLvCode()">Desbloquear expediente →</button>
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
//  ▶ BASE DE DATOS DE PERSONAJES
//
//  CÓMO AGREGAR UN PERSONAJE NUEVO:
//  ─────────────────────────────────────────────────────────────────────────
//  1. Copia el bloque completo { id: "...", ... } de cualquier personaje
//     existente y pégalo antes del comentario "PERSONAJES BLOQUEADOS".
//  2. Cambia los campos necesarios:
//       id        → identificador único (minúsculas, sin espacios)
//       code      → código que debe ingresar el jugador para desbloquearlo
//       name      → nombre completo
//       codename  → "SUJETO-XX // ALIAS"
//       role      → cargo o rol en la historia
//       status    → "vivo" | "desaparecido" | "muerto" | "desconocido" | "fragmentado"
//       image     → URL de la imagen del personaje (deja "" si no tienes imagen)
//       accentColor → color hexadecimal que tiñe el hero y el avatar
//       heroColor → [fondo oscuro, fondo medio, color acento] para el canvas
//       stats     → lista de { name, val (0-100), color }
//       lore      → lista de párrafos de historia (strings)
//       fragments → lista de { id:"F-001", text:"...", locked:true/false }
//       relations → lista de { name:"Nombre", type:"Tipo de relación" }
//       quickInfo → lista de { l:"Etiqueta", v:"Valor" }
//  3. Agrega el código en menu.html dentro de CHAR_CODES.
//  4. Actualiza TOTAL_CHARS en menu.html.
//
//  IMÁGENES:
//  ─────────────────────────────────────────────────────────────────────────
//  - Coloca la imagen en la misma carpeta que el HTML o usa una URL absoluta.
//  - Se recomienda formato vertical (portrait), mínimo 400×600px.
//  - Si dejas image:"", el personaje mostrará el fondo generativo de canvas.
//
//  SUJETOS BLOQUEADOS (al final del array):
//  ─────────────────────────────────────────────────────────────────────────
//  Son los personajes que aparecen en la lista pero no pueden desbloquearse
//  todavía. Solo muestran el nombre genérico y el estado. Para convertir
//  uno en un personaje real, dale sus datos completos y quita locked:true.
// ══════════════════════════════════════════════════════════════════════════
const CHARACTERS = [

  // ────────────────────────────────────────────────────────
  //  SUJETO 01 — VALERIA ORIN
  //  Código de desbloqueo: ESPEJO-01
  // ────────────────────────────────────────────────────────
  {
    id: "valeria",
    code: "ESPEJO-01",
    name: "???",
    codename: "SUJETO-01 // ESPEJO",
    role: "Investigadora principal",
    status: "desaparecido",
    image: "",  // ← Sin imagen: usa canvas generativo
    accentColor: "#4ec9e8",
    heroColor: ["#0a1a30","#0d2040","#4ec9e8"],
    stats: [
      {name:"Inteligencia", val:92, color:"#4ec9e8"},
      {name:"Voluntad",     val:78, color:"#60b0ff"},
      {name:"Percepción",   val:88, color:"#4ec9e8"},
      {name:"Influencia",   val:55, color:"#8090c0"},
      {name:"Resistencia",  val:61, color:"#60b0ff"},
      {name:"Misterio",     val:95, color:"#c090ff"},
    ],
    lore: [
      "Valeria Orin fue la primera investigadora del Observatorio en documentar la existencia del Fragmento Mayor. Sus registros datan del ciclo 001, cuando aún nadie creía en la teoría de la fractura.",
      "Desapareció de forma abrupta durante la expedición al Sector Cuatro. El último registro de sus coordenadas la sitúa frente a una anomalía de clase Ω — tipo que, según sus propios archivos, no debería existir.",
      "Algunos fragmentos de su diario personal siguen circulando entre los que saben buscar. Sus palabras finales: «El espejo no refleja lo que hay. Refleja lo que hubo.»"
    ],
    fragments: [
      {id:"F-001", text:"«No confíes en lo que ves al otro lado. El espejo recuerda versiones que nosotros hemos olvidado.»", locked:false},
      {id:"F-002", text:"«Hoy encontré la segunda fractura. Es más grande. Respira.»", locked:false},
      {id:"F-003", text:"Fragmento encriptado — código ESPEJO-03 requerido.", locked:true},
    ],
    relations: [
      {name:"Kieran Voss", type:"Aliado conflictivo"},
      {name:"Noa Seil",    type:"Mentora"},
      {name:"Seren Arc",   type:"Desconocido"},
    ],
    quickInfo: [
      {l:"Edad",            v:"27 años"},
      {l:"Origen",          v:"Ciudad de Lux"},
      {l:"Última ubicación",v:"Sector Cuatro"},
      {l:"Facción",         v:"Observatorio"},
      {l:"Especialidad",    v:"Análisis de anomalías"},
      {l:"Código",          v:"ESPEJO-01"},
    ],
  },

  // ────────────────────────────────────────────────────────
  //  SUJETO 02 — KIERAN VOSS
  //  Código de desbloqueo: SOMBRA-02
  // ────────────────────────────────────────────────────────
  {
    id: "kieran",
    code: "SOMBRA-02",
    name: "???",
    codename: "SUJETO-02 // SOMBRA",
    role: "Agente encubierto",
    status: "vivo",
    image: "",  // ← Sin imagen
    accentColor: "#9060d0",
    heroColor: ["#0d0818","#180a2a","#9060d0"],
    stats: [
      {name:"Inteligencia", val:74, color:"#9060d0"},
      {name:"Voluntad",     val:90, color:"#c080ff"},
      {name:"Percepción",   val:82, color:"#9060d0"},
      {name:"Influencia",   val:88, color:"#c080ff"},
      {name:"Resistencia",  val:95, color:"#9060d0"},
      {name:"Misterio",     val:70, color:"#8050c0"},
    ],
    lore: [
      "Kieran Voss opera en los márgenes de la estructura. Nadie sabe con exactitud para quién trabaja — ni él mismo parece saberlo del todo.",
      "Fue visto por última vez en el mercado negro de información del ciclo 005, adquiriendo copias de los diarios de Valeria. Su interés en el caso no es casual.",
      "Tiene una cicatriz en forma de línea fracturada en el antebrazo izquierdo. Los que conocen el símbolo dicen que significa que ya estuvo al otro lado, y volvió solo."
    ],
    fragments: [
      {id:"F-001", text:"«Hay dos versiones de cada persona. La que actúa y la que observa. Yo soy la que observa.»", locked:false},
      {id:"F-002", text:"Fragmento encriptado — código SOMBRA-04 requerido.", locked:true},
      {id:"F-003", text:"Fragmento encriptado — código SOMBRA-07 requerido.", locked:true},
    ],
    relations: [
      {name:"Valeria Orin", type:"Aliado conflictivo"},
      {name:"Arlo Seis",    type:"Contacto"},
      {name:"Mara Dunn",    type:"Deuda pendiente"},
    ],
    quickInfo: [
      {l:"Edad",            v:"31 años"},
      {l:"Origen",          v:"Desconocido"},
      {l:"Última ubicación",v:"Mercado del Ciclo"},
      {l:"Facción",         v:"Independiente"},
      {l:"Especialidad",    v:"Infiltración"},
      {l:"Código",          v:"SOMBRA-02"},
    ],
  },

  // ────────────────────────────────────────────────────────
  //  SUJETO 03 — NOA SEIL
  //  Código de desbloqueo: LUZ-03
  // ────────────────────────────────────────────────────────
  {
    id: "noa",
    code: "LUZ-03",
    name: "???",
    codename: "SUJETO-03 // LUZ",
    role: "Archivista del Observatorio",
    status: "vivo",
    image: "",
    accentColor: "#f0c040",
    heroColor: ["#1a1000","#281800","#f0c040"],
    stats: [
      {name:"Inteligencia", val:97, color:"#f0c040"},
      {name:"Voluntad",     val:65, color:"#e0a030"},
      {name:"Percepción",   val:91, color:"#f0c040"},

  {id:"subject08", code:"", name:"", codename:"CLASIFICADO", role:"", status:"desconocido", locked:true, image:"", accentColor:"#506070", stats:[], lore:[], fragments:[], relations:[], quickInfo:[], heroColor:["#080808","#0c0c0c","#506070"]},

  // Sujeto 09 — edita los campos cuando tengas el personaje listo
  {id:"subject09", code:"", name:"", codename:"CLASIFICADO", role:"", status:"desconocido", locked:true, image:"", accentColor:"#804040", stats:[], lore:[], fragments:[], relations:[], quickInfo:[], heroColor:["#100808","#180a0a","#804040"]},

  // Sujeto 10 — edita los campos cuando tengas el personaje listo
  {id:"subject10", code:"", name:"", codename:"CLASIFICADO", role:"", status:"desconocido", locked:true, image:"", accentColor:"#506070", stats:[], lore:[], fragments:[], relations:[], quickInfo:[], heroColor:["#080808","#0c0c0c","#506070"]},
];

// ══════════════════════════════════════════════════════════════════════════
//  ESTADO Y CÓDIGOS — no editar esta sección
// ══════════════════════════════════════════════════════════════════════════
const CHAR_CODES = {};
CHARACTERS.forEach(c=>{
  if(c.code && !c.code.startsWith('???')) CHAR_CODES[c.code]=c.id;
});

function loadState(){try{return JSON.parse(localStorage.getItem('pf_state')||'{}');}catch(e){return {};}}
function saveState(s){localStorage.setItem('pf_state',JSON.stringify(s));}
let STATE=loadState();
if(!STATE.unlocked) STATE.unlocked=[];
if(!STATE.unlockedDates) STATE.unlockedDates={};

let activeFilter='all';
let selectedChar=null;

// ══════════════════════════════════════════════════════════════════════════
//  RENDER SIDEBAR
// ══════════════════════════════════════════════════════════════════════════
function renderList(){
  const list=document.getElementById('char-list');
  list.innerHTML='';

  const unlocked=STATE.unlocked.length;
  const total=CHARACTERS.filter(c=>!c.locked).length;
  document.getElementById('sb-count').textContent=`${unlocked} / ${total} expedientes`;

  CHARACTERS.forEach(char=>{
    if(activeFilter!=='all'){
      const isUnlocked=STATE.unlocked.includes(char.id)&&!char.locked;
      if(!isUnlocked||char.status!==activeFilter) return;
    }
    const isUnlocked=STATE.unlocked.includes(char.id)&&!char.locked;
    const item=document.createElement('div');
    item.className='char-item'+(isUnlocked?'':' locked')+(selectedChar?.id===char.id?' active':'');
    item.dataset.id=char.id;

    const statusLabel={'vivo':'Vivo','desaparecido':'Desap.','muerto':'Muerto','desconocido':'?','fragmentado':'Frag.'}[char.status]||'?';

    item.innerHTML=`
      <div class="char-avatar">
        <canvas width="38" height="38" data-charid="${char.id}"></canvas>
        ${isUnlocked && char.image ? `<img class="char-avatar-img" src="${char.image}" alt="${char.name}" loading="lazy"/>` : ''}
        <span class="char-avatar-letter">${isUnlocked?char.name[0]:'?'}</span>
      </div>
      <div class="char-info">
        <p class="char-name">${isUnlocked?char.name:'??? ????'}</p>
        <p class="char-role">${isUnlocked?char.role:'Clasificado'}</p>
      </div>
      <span class="char-status status-${char.status}">${statusLabel}</span>
      ${!isUnlocked?'<span class="lock-icon">🔒</span>':''}`;

    item.addEventListener('click',()=>selectChar(char,isUnlocked));
    list.appendChild(item);
    drawMiniAvatar(item.querySelector('canvas'),char,isUnlocked);
  });
}

function drawMiniAvatar(c,char,unlocked){
  if(!c)return;
  const ctx=c.getContext('2d'),w=38,h=38;
  const col=char.accentColor||'#4ec9e8';
  ctx.fillStyle='rgba(4,10,22,1)';ctx.fillRect(0,0,w,h);
  if(unlocked){
    const g=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.7);
    g.addColorStop(0,col+'22');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=col+'40';ctx.lineWidth=.5;ctx.strokeRect(0,0,w,h);
  } else {
    ctx.fillStyle='rgba(255,255,255,.04)';
    for(let i=0;i<3;i++){ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*10+2,1);}
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  SELECCIONAR PERSONAJE
// ══════════════════════════════════════════════════════════════════════════
function selectChar(char,isUnlocked){
  selectedChar=char;
  document.querySelectorAll('.char-item').forEach(i=>i.classList.toggle('active',i.dataset.id===char.id));
  document.getElementById('empty-state').style.display='none';

  if(isUnlocked){
    document.getElementById('locked-view').style.display='none';
    document.getElementById('profile').style.display='flex';
    renderProfile(char);
  } else {
    document.getElementById('profile').style.display='none';
    document.getElementById('locked-view').style.display='flex';
    document.getElementById('lv-name').textContent=char.locked?'Expediente clasificado':char.name;
    document.getElementById('lv-input').value='';
    document.getElementById('lv-msg').textContent='';
    const inp=document.getElementById('lv-input');
    inp.onkeydown=null;
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkLvCode();});
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  RENDER PERFIL
// ══════════════════════════════════════════════════════════════════════════
function renderProfile(char){
  document.getElementById('p-codename').textContent=char.codename;
  document.getElementById('p-name').textContent=char.name;
  document.getElementById('p-role').textContent=char.role;
  document.getElementById('p-id').textContent=char.codename;

  // Fecha de desbloqueo
  const dateStr = STATE.unlockedDates?.[char.id] || 'Expediente archivado';
  document.getElementById('p-unlock-date').textContent = `Desbloqueado: ${dateStr}`;

  const badge=document.getElementById('p-status-badge');
  badge.textContent={'vivo':'● Vivo','desaparecido':'◈ Desaparecido','muerto':'✕ Muerto','desconocido':'? Desconocido','fragmentado':'◇ Fragmentado'}[char.status]||char.status;
  badge.className='p-status-badge status-'+char.status;

  // Hero canvas + imagen real
  const hc=document.getElementById('hero-canvas');
  hc.width=hc.offsetWidth||800;hc.height=220;
  drawHero(hc,char);

  const heroImg=document.getElementById('hero-img');
  const colorOverlay=document.getElementById('hero-color-overlay');

  if(char.image){
    heroImg.classList.remove('loaded');
    heroImg.src=char.image;
    heroImg.alt=char.name;
    // El overlay de color tiñe la imagen con el acento del personaje
    colorOverlay.style.background=char.accentColor||'transparent';
  } else {
    heroImg.src='';
    heroImg.classList.remove('loaded');
    colorOverlay.style.background='transparent';
  }

  // Cuerpo del perfil
  const body=document.getElementById('p-body');
  body.innerHTML=`
    <div class="p-section">
      <p class="sec-label">Historia</p>
      <div class="p-lore">${char.lore.map(p=>`<p>${p}</p>`).join('')}</div>
    </div>
    <div class="p-section-half">
      <p class="sec-label">Estadísticas</p>
      <div class="stats-grid" id="stats-grid"></div>
    </div>
    <div class="p-section-half">
      <p class="sec-label">Datos del expediente</p>
      <div class="quick-info">${char.quickInfo.map(q=>`
        <div class="qi"><p class="qi-l">${q.l}</p><p class="qi-v">${q.v}</p></div>`).join('')}
      </div>
    </div>
    <div class="p-section">
      <p class="sec-label">Fragmentos de memoria</p>
      <div class="fragments-list">${char.fragments.map(f=>`
        <div class="fragment${f.locked?' locked-frag':''}">
          <p class="frag-num">${f.id}</p>
          ${f.locked?`<p class="frag-lock">${f.text}</p>`:`<p class="frag-text">${f.text}</p>`}
        </div>`).join('')}
      </div>
    </div>
    ${char.relations.length?`
    <div class="p-section">
      <p class="sec-label">Relaciones conocidas</p>
      <div class="rels">${char.relations.map(r=>`
        <div class="rel">
          <span class="rel-name">${r.name}</span>
          <span class="rel-type">${r.type}</span>
        </div>`).join('')}
      </div>
    </div>`:''}`;

  // Animar stats
  const sg=document.getElementById('stats-grid');
  if(sg) char.stats.forEach(s=>{
    const row=document.createElement('div');row.className='stat-row';
    row.innerHTML=`<span class="stat-name">${s.name}</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:0%;background:${s.color}"></div></div><span class="stat-val">${s.val}</span>`;
    sg.appendChild(row);
    setTimeout(()=>{ const bar=row.querySelector('.stat-bar'); if(bar)bar.style.width=s.val+'%'; },100);
  });

  // Scroll al top del panel
  document.getElementById('detail').scrollTo({top:0,behavior:'smooth'});
}

function drawHero(c,char){
  const w=c.width,h=c.height;
  if(!w||!h)return;
  const ctx=c.getContext('2d');
  const [bg1,bg2,accent]=char.heroColor||['#04090f','#08121e','#4ec9e8'];
  ctx.fillStyle=bg1;ctx.fillRect(0,0,w,h);
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,bg2);g.addColorStop(1,bg1);
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=accent+'18';ctx.lineWidth=1;
  const lines=[[.1,.0,.35,.8],[.45,.05,.6,.95],[.72,.1,.5,.9],[.85,.0,.95,.7]];
  lines.forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*w,y1*h);ctx.lineTo(x2*w,y2*h);ctx.stroke();
  });
  const gr=ctx.createRadialGradient(w*.15,h*.5,0,w*.15,h*.5,w*.4);
  gr.addColorStop(0,accent+'15');gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);
  ctx.fillStyle=accent+'30';
  for(let i=0;i<20;i++){
    const px=Math.random()*w,py=Math.random()*h,ps=Math.random()*2+.5;
    ctx.beginPath();ctx.arc(px,py,ps,0,Math.PI*2);ctx.fill();
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  DESBLOQUEO DESDE VISTA BLOQUEADA
// ══════════════════════════════════════════════════════════════════════════
function checkLvCode(){
  const inp=document.getElementById('lv-input');
  const msg=document.getElementById('lv-msg');
  if(!inp||!msg||!selectedChar)return;
  const val=inp.value.trim().toUpperCase();
  msg.style.color='rgba(78,201,232,.5)';msg.textContent='Verificando...';

  setTimeout(()=>{
    const targetId=CHAR_CODES[val];
    if(targetId){
      if(!STATE.unlocked.includes(targetId)){
        STATE.unlocked.push(targetId);
        STATE.unlockedDates[targetId]=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
        saveState(STATE);
      }
      msg.style.color='rgba(80,220,130,.9)';msg.textContent='✓ Expediente desbloqueado';
      setTimeout(()=>{
        const char=CHARACTERS.find(c=>c.id===targetId);
        if(char){renderList();selectChar(char,true);}
      },600);
    } else {
      msg.style.color='rgba(220,80,80,.8)';msg.textContent='✗ Código no reconocido';
      inp.value='';
      setTimeout(()=>{msg.textContent='';},1600);
    }
  },500);
}

// ══════════════════════════════════════════════════════════════════════════
//  FILTROS
// ══════════════════════════════════════════════════════════════════════════
document.querySelectorAll('.sf').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sf').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter=btn.dataset.f;
    renderList();
  });
});

// ══════════════════════════════════════════════════════════════════════════
//  FONDO CANVAS
// ══════════════════════════════════════════════════════════════════════════
const bgC=document.getElementById('bg-canvas');
const bgX=bgC.getContext('2d');
let shards=[],parts=[];
function initBg(){
  bgC.width=window.innerWidth;bgC.height=window.innerHeight;
  shards=Array.from({length:18},mkShard);
  parts=Array.from({length:60},mkPart);
}
function mkShard(){const W=bgC.width,H=bgC.height;return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:.2+Math.random()*.5,rot:Math.random()*360,rs:(Math.random()-.5)*.9,sz:5+Math.random()*20,op:.05+Math.random()*.18};}
function mkPart(){const W=bgC.width,H=bgC.height;return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:.6+Math.random()*1.8,op:.04+Math.random()*.18,ph:Math.random()*Math.PI*2};}
function drawBg(t){
  const W=bgC.width,H=bgC.height;if(!W||!H)return;
  bgX.fillStyle='rgba(3,8,16,.15)';bgX.fillRect(0,0,W,H);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=.015;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;const op=p.op*(.5+.5*Math.sin(p.ph));bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);bgX.fillStyle=`rgba(78,201,232,${op})`;bgX.fill();});
  shards.forEach(s=>{s.y+=s.vy;s.x+=s.vx;s.rot+=s.rs;if(s.y>H+30)Object.assign(s,mkShard(),{y:-30,x:Math.random()*W});bgX.save();bgX.translate(s.x,s.y);bgX.rotate(s.rot*Math.PI/180);bgX.globalAlpha=s.op;bgX.fillStyle='rgba(80,160,200,.08)';bgX.strokeStyle='rgba(78,201,232,.35)';bgX.lineWidth=.6;const z=s.sz;bgX.beginPath();bgX.moveTo(0,-z);bgX.lineTo(z*.6,-z*.1);bgX.lineTo(z*.4,z*.5);bgX.lineTo(-z*.2,z*.8);bgX.lineTo(-z*.6,z*.05);bgX.closePath();bgX.fill();bgX.stroke();bgX.restore();});
}
window.addEventListener('resize',initBg);
initBg();
(function loop(t){drawBg(t);requestAnimationFrame(loop);})();

// ══════════════════════════════════════════════════════════════════════════
//  INIT — al cargar la página
// ══════════════════════════════════════════════════════════════════════════
renderList();

// Si hay personajes desbloqueados, selecciona el primero automáticamente
if(STATE.unlocked.length>0){
  const first=CHARACTERS.find(c=>STATE.unlocked.includes(c.id));
  if(first) setTimeout(()=>selectChar(first,true),100);
}
</script>
